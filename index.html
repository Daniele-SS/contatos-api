<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer type="module"></script>
    <title>Gerenciamento de Contatos</title>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="header-title">
                <div class="header-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <h1>Contatos</h1>
            </div>
            <span class="header-badge" id="contatos-count">— contatos</span>
        </div>
    </header>

    <main>
        <section class="form-section">

            <div class="form-card">
                <div class="form-grid">
                    <div class="field">
                        <label for="input-nome">Nome</label>
                        <input id="input-nome" type="text" placeholder="Nome completo" />
                    </div>
                    <div class="field">
                        <label for="input-celular">Celular</label>
                        <input id="input-celular" type="text" placeholder="00 9 0000-0000" />
                    </div>
                    <div class="field">
                        <label for="input-email">E-mail</label>
                        <input id="input-email" type="email" placeholder="email@exemplo.com" />
                    </div>
                    <div class="field">
                        <label for="input-cidade">Cidade</label>
                        <input id="input-cidade" type="text" placeholder="Cidade" />
                    </div>
                    <div class="field full">
                        <label for="input-foto">URL da foto</label>
                        <input id="input-foto" type="url" placeholder="https://..." />
                    </div>
                    <div class="field full">
                        <label for="input-endereco">Endereço</label>
                        <input id="input-endereco" type="text" placeholder="Rua, número" />
                    </div>
                </div>
                <p id="msg-erro" class="msg-erro" hidden></p>
                <button id="btn-salvar" class="btn-save">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Salvar contato
                </button>
            </div>
        </section>

        <section>
            <p class="section-label">Contatos salvos</p>
            <div id="lista-contatos" class="cards-grid"></div>
        </section>
    </main>

</body>
</html>
