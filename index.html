<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer type="module"></script>
    <title>Gerenciamento de Contatos</title>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="header-title">
                <div class="header-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <h1>Contatos</h1>
            </div>
            <span class="header-badge" id="contatos-count">— contatos</span>
        </div>
    </header>

    <main>
        <section class="form-section">
            <div class="form-card">
                <div class="form-grid">
                    <div class="field">
                        <label for="input-nome">Nome</label>
                        <input id="input-nome" type="text" placeholder="Nome completo" />
                    </div>
                    <div class="field">
                        <label for="input-celular">Celular</label>
                        <input id="input-celular" type="text" placeholder="00 9 0000-0000" />
                    </div>
                    <div class="field">
                        <label for="input-email">E-mail</label>
                        <input id="input-email" type="email" placeholder="email@exemplo.com" />
                    </div>
                    <div class="field">
                        <label for="input-cidade">Cidade</label>
                        <input id="input-cidade" type="text" placeholder="Cidade" />
                    </div>
                    <div class="field full">
                        <label for="input-foto">URL da foto</label>
                        <input id="input-foto" type="url" placeholder="https://..." />
                    </div>
                    <div class="field full">
                        <label for="input-endereco">Endereço</label>
                        <input id="input-endereco" type="text" placeholder="Rua, número" />
                    </div>
                </div>
                <p id="msg-erro" class="msg-erro" hidden></p>
                <button id="btn-salvar" class="btn-save">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Salvar contato
                </button>
            </div>
        </section>

        <section>
            <p class="section-label">Contatos salvos</p>
            <div id="lista-contatos" class="cards-grid"></div>
        </section>
    </main>

    <!-- ── Modal de edição ── -->
    <div id="modal-overlay" class="modal-overlay"></div>
    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
        <div class="modal-header">
            <h2 id="modal-titulo" class="modal-titulo">Editar contato</h2>
            <button id="btn-modal-fechar" class="btn-modal-fechar" aria-label="Fechar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <div class="modal-body">
            <div class="form-grid">
                <div class="field">
                    <label for="modal-input-nome">Nome</label>
                    <input id="modal-input-nome" type="text" placeholder="Nome completo" />
                </div>
                <div class="field">
                    <label for="modal-input-celular">Celular</label>
                    <input id="modal-input-celular" type="text" placeholder="00 9 0000-0000" />
                </div>
                <div class="field">
                    <label for="modal-input-email">E-mail</label>
                    <input id="modal-input-email" type="email" placeholder="email@exemplo.com" />
                </div>
                <div class="field">
                    <label for="modal-input-cidade">Cidade</label>
                    <input id="modal-input-cidade" type="text" placeholder="Cidade" />
                </div>
                <div class="field full">
                    <label for="modal-input-foto">URL da foto</label>
                    <input id="modal-input-foto" type="url" placeholder="https://..." />
                </div>
                <div class="field full">
                    <label for="modal-input-endereco">Endereço</label>
                    <input id="modal-input-endereco" type="text" placeholder="Rua, número" />
                </div>
            </div>
            <p id="modal-msg-erro" class="msg-erro" hidden></p>
        </div>

        <div class="modal-footer">
            <button id="btn-modal-deletar" class="btn-deletar">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14H6L5 6"/>
                    <path d="M10 11v6M14 11v6"/>
                    <path d="M9 6V4h6v2"/>
                </svg>
                Deletar contato
            </button>
            <button id="btn-modal-salvar" class="btn-save">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
                Salvar alterações
            </button>
        </div>
    </div>

    <!-- ── Confirmação de delete ── -->
    <div id="confirm-overlay" class="confirm-overlay"></div>
    <div id="confirm-box" class="confirm-box" role="alertdialog" aria-modal="true">
        <p class="confirm-texto">Tem certeza que deseja deletar este contato? Esta ação não pode ser desfeita.</p>
        <div class="confirm-acoes">
            <button id="btn-confirm-nao" class="btn-confirm-nao">Cancelar</button>
            <button id="btn-confirm-sim" class="btn-confirm-sim">Sim, deletar</button>
        </div>
    </div>

</body>
</html>
