<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer type="module"></script>
    <title>CONTATOS</title>
</head>
<body>
    <main>
        <section class="form-section">
            <div class="form-card">
                <div class="form-grid">
                    <div class="field"><label for="input-nome">Nome</label><input id="input-nome" type="text" placeholder="Nome completo" /></div>
                    <div class="field"><label for="input-celular">Celular</label><input id="input-celular" type="text" placeholder="00 9 0000-0000" /></div>
                    <div class="field"><label for="input-email">E-mail</label><input id="input-email" type="email" placeholder="email@exemplo.com" /></div>
                    <div class="field"><label for="input-cidade">Cidade</label><input id="input-cidade" type="text" placeholder="Cidade" /></div>
                    <div class="field full"><label for="input-foto">URL da foto</label><input id="input-foto" type="url" placeholder="https://..." /></div>
                    <div class="field full"><label for="input-endereco">Endereço</label><input id="input-endereco" type="text" placeholder="Rua, número" /></div>
                </div>
                <p id="msg-erro" class="msg-erro" hidden></p>
                <button id="btn-salvar" class="btn-save">Salvar contato</button>
            </div>
        </section>

        <section>
            <p class="section-label">Contatos</p>
            <div id="lista-contatos" class="cards-grid"></div>
        </section>
    </main>
</body>
</html>
